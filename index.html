<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infini Solutions - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#007FFF',
                            dark: '#0a0a0a',
                            gray: '#333333'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(1.1)' },
                            '100%': { opacity: '1', transform: 'scale(1)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #141414; /* Cor de fundo padrão do Netflix */
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .app-card {
            transition: transform 0.3s ease-in-out, border-color 0.3s ease;
        }

        .app-card:hover {
            transform: scale(1.1);
        }

        .app-card:hover .app-box {
            border-color: #007FFF; /* Azul Infini */
            box-shadow: 0 0 15px rgba(0, 127, 255, 0.5);
        }

        .app-card:hover .app-title {
            color: #fff;
        }

        .app-box {
            width: 15vw;
            height: 15vw;
            max-width: 160px;
            max-height: 160px;
            min-width: 100px;
            min-height: 100px;
            background-color: #333;
            border: 3px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .app-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
        }

        .app-title {
            color: gray;
            margin-top: 15px;
            font-size: 1.2VW;
            transition: color 0.3s ease;
            text-align: center;
        }

        @media (min-width: 768px) {
            .app-title { font-size: 18px; }
        }

        .navbar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }

        .coming-soon-badge {
            position: absolute;
            bottom: 8px;
            background-color: #000;
            border: 1px solid #007FFF;
            color: #007FFF;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center animate-fade-in relative">

    <!-- Navbar -->
    <nav class="absolute top-0 left-0 w-full p-6 navbar z-50 flex justify-between items-center">
        <!-- Logo -->
        <a href="#" class="cursor-pointer">
            <img src="assets/logo.png" alt="Infini Solutions" class="h-10 md:h-12 object-contain" 
                 onerror="this.outerHTML='<div class=\'flex items-center tracking-tight font-bold text-3xl md:text-4xl\'><span class=\'text-white\'>infini</span><span class=\'text-[#007FFF] font-extrabold\'>Solutions</span></div>'">
        </a>
        
        <!-- Botão Login Admin (Engrenagem) -->
        <button onclick="document.getElementById('adminModal').classList.remove('hidden')" class="text-gray-400 hover:text-white cursor-pointer transition flex items-center gap-2">
            <i class="fa-solid fa-user-lock text-xl"></i>
            <span class="hidden md:inline font-medium text-sm">Admin</span>
        </button>
    </nav>

    <!-- Main Content -->
    <div class="z-10 flex flex-col items-center w-full px-4">
        <h1 class="text-3xl md:text-5xl font-normal text-white mb-12 text-center tracking-wide">
            Qual aplicação deseja acessar?
        </h1>

        <div class="flex flex-wrap justify-center gap-6 md:gap-10">
            
            <!-- App 1: NucleoFix (Ativo) -->
            <a href="https://nucleofix.infinisolutions.cloud/" class="app-card flex flex-col items-center cursor-pointer group outline-none">
                <div class="app-box group-focus:border-brand-blue group-focus:shadow-[0_0_15px_rgba(0,127,255,0.5)] bg-gradient-to-br from-blue-900 to-gray-800">
                    <i class="fa-brands fa-whatsapp text-6xl text-white z-10"></i>
                </div>
                <span class="app-title group-focus:text-white font-medium">NucleoFix</span>
            </a>

            <!-- App 2: Granfino (Ativo) -->
            <a href="https://granfino.infinisolutions.cloud/" class="app-card flex flex-col items-center cursor-pointer group outline-none relative w-[100px] md:w-[160px]">
                <div class="app-box group-focus:border-brand-blue group-focus:shadow-[0_0_15px_rgba(0,127,255,0.5)] bg-gradient-to-br from-blue-900 to-gray-800 flex-col relative w-full">
                    <i class="fa-solid fa-store text-5xl text-white z-10 mb-2"></i>
                </div>
                <span class="app-title group-focus:text-white font-medium">Granfino</span>
            </a>

            <!-- App 3: Portal RH (Apenas Placeholder) -->
            <div class="app-card flex flex-col items-center cursor-not-allowed opacity-50 relative w-[100px] md:w-[160px]">
                <div class="app-box bg-gradient-to-br from-gray-700 to-gray-900 flex-col relative w-full">
                    <i class="fa-solid fa-users text-5xl text-gray-500 z-10 mb-2"></i>
                    <div class="coming-soon-badge border-gray-500 text-gray-500">Futuro</div>
                </div>
                <span class="app-title">Portal RH</span>
            </div>

            <!-- App 4: DeskTicket (Apenas Placeholder) -->
            <div class="app-card flex flex-col items-center cursor-not-allowed opacity-50 relative w-[100px] md:w-[160px]">
                <div class="app-box bg-gradient-to-br from-gray-700 to-gray-900 flex-col relative w-full">
                    <i class="fa-solid fa-headset text-5xl text-gray-500 z-10 mb-2"></i>
                    <div class="coming-soon-badge border-gray-500 text-gray-500">Futuro</div>
                </div>
                <span class="app-title">DeskTicket</span>
            </div>

        </div>

        <button class="mt-16 md:mt-24 px-8 py-2 border border-gray-500 text-gray-400 hover:text-white hover:border-white transition tracking-widest uppercase text-sm font-medium rounded-sm">
            Gerenciar Aplicações
        </button>
    </div>

    <!-- Modal Login de Admin da Intranet -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center animate-fade-in">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-lg shadow-2xl w-full max-w-sm relative">
            <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h2 class="text-2xl font-semibold text-white mb-6">Administração</h2>
            
            <form onsubmit="event.preventDefault(); alert('Login para o portal de administração será implementado na retaguarda.');">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2" for="adminCode">Código de Acesso</label>
                    <input type="password" id="adminCode" required class="w-full bg-gray-800 text-white border border-gray-600 rounded px-4 py-3 focus:outline-none focus:border-brand-blue transition" placeholder="Insira o código">
                </div>
                <button type="submit" class="w-full bg-brand-blue hover:bg-blue-600 text-white font-bold py-3 px-4 rounded transition shadow-[0_0_15px_rgba(0,127,255,0.4)]">
                    Entrar no Painel
                </button>
            </form>
        </div>
    </div>

</body>
</html>
