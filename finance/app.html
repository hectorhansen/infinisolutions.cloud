<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infini Finance - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#22c55e',
                            red: '#ef4444',
                            dark: '#0f172a',
                            card: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/style.css"> <!-- Vamos criar estilo leve extra -->
    <style>
        body {
            background-color: #0b0b0b;
            color: #e2e8f0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-image: linear-gradient(to bottom, #0f172a 0%, #020617 100%);
            min-height: 100vh;
        }

        /* Glass Cards Minimalistas */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }

        .sidebar-link {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar-link.active {
            background: rgba(30, 41, 59, 0.8);
            border-left-color: #22c55e;
            color: #22c55e;
        }

        .sidebar-link:hover:not(.active) {
            background: rgba(30, 41, 59, 0.5);
            color: white;
        }

        /* Modal Background Fade */
        .modal-bg {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        /* Toast nativo simplificado */
        .toast {
            visibility: hidden;
            min-width: 250px;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            bottom: 30px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .glass-panel { background: white; border: 1px solid #ddd; }
        }
    </style>
</head>

<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden flex items-center justify-between p-4 glass-panel border-b no-print z-50">
        <h1 class="text-xl font-bold tracking-tight"><span class="text-white">infini</span><span class="text-brand-green">Finance</span></h1>
        <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="text-gray-300 hover:text-white">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <!-- Sidebar Lateral -->
    <aside id="mobileMenu" class="hidden md:flex flex-col w-full md:w-64 glass-panel border-r shrink-0 no-print transition-all absolute md:relative z-40 h-full">
        <div class="p-6 hidden md:block">
            <h1 class="text-2xl font-bold tracking-tight"><span class="text-white">infini</span><span class="text-brand-green">Finance</span></h1>
            <p class="text-xs text-gray-500 mt-1 uppercase tracking-wider">Gestão de Sociedade</p>
        </div>

        <nav class="flex-1 px-4 py-4 space-y-2 mt-4 md:mt-0">
            <a href="#" onclick="app.navigate('projects')" id="menu-projects" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400">
                <i class="fa-solid fa-folder-open w-5 text-center"></i>
                <span class="font-medium">Projetos</span>
            </a>
            
            <a href="#" onclick="app.navigate('categories')" id="menu-categories" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400">
                <i class="fa-solid fa-tags w-5 text-center"></i>
                <span class="font-medium">Categorias</span>
            </a>

            <!-- Aba Dinâmica (Aparece ao selecionar projeto) -->
            <div id="projectContextLinks" class="hidden mt-6 pt-6 border-t border-slate-700/50">
                <div class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" id="navProjectTitle">PROJETO ATUAL</div>
                
                <a href="#" onclick="app.navigate('entries')" id="menu-entries" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400">
                    <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i>
                    <span class="font-medium">Lançamentos</span>
                </a>
                
                <a href="#" onclick="app.navigate('reports')" id="menu-reports" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400">
                    <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                    <span class="font-medium">Relatório & Fechamento</span>
                </a>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-700/50">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 rounded-full bg-brand-green/20 text-brand-green flex items-center justify-center font-bold" id="userInitial">U</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-medium text-white truncate" id="userNameLabel">Carregando...</p>
                </div>
                <button onclick="app.logout()" class="text-gray-500 hover:text-red-400 transition" title="Sair">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto">
        <div class="container mx-auto p-4 md:p-8 max-w-6xl pb-24" id="mainContainer">
            <!-- View Dinâmica (Injetada via JS) -->
        </div>
    </main>

    <!-- Modais Injetados Globalmente -->
    <div id="modalContainer"></div>

    <!-- Toast UI -->
    <div id="toast" class="toast shadow-2xl">
        <div class="flex items-center gap-3">
            <i id="toastIcon" class="fa-solid"></i>
            <span id="toastMsg" class="font-medium text-left"></span>
        </div>
    </div>

    <!-- Core App Engine -->
    <script src="assets/app.js"></script>
</body>

</html>
