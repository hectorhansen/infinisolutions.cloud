<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WhatsApp Business Manager</title>
    <!-- Tailwind via CDN para prototipagem rápida s/ build step backend -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wa: {
                            light: '#25D366',
                            DEFAULT: '#128C7E',
                            dark: '#075E54',
                            bg: '#E5DDD5',
                            bubblein: '#FFFFFF',
                            bubbleout: '#E2F7CB'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans selection:bg-wa-light selection:text-white">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md transform transition-all hover:shadow-2xl hover:-translate-y-1 duration-300">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-wa-light rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                <i class="fa-brands fa-whatsapp text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Business Manager</h1>
            <p class="text-gray-500 mt-1 text-sm">Entre com suas credenciais de operador</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div id="errorMsg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-center gap-2 border border-red-200">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Credenciais inválidas.</span>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="email">E-mail</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email" required 
                        class="pl-10 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-wa focus:border-wa sm:text-sm border p-2.5 transition-colors focus:outline-none" 
                        placeholder="operador@empresa.com.br">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required 
                        class="pl-10 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-wa focus:border-wa sm:text-sm border p-2.5 transition-colors focus:outline-none" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-wa hover:bg-wa-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-wa transition-all group">
                <span id="btnText">Entrar no sistema</span>
                <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('../api/index.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Erro ao fazer login');
                }

                localStorage.setItem('wab_token', data.token);
                localStorage.setItem('wab_op_id', data.operator_id);
                window.location.href = 'dashboard.html';

            } catch (err) {
                errorText.textContent = err.message;
                errorBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Entrar no sistema <i class="fa-solid fa-arrow-right ml-2"></i>';
            }
        });
    </script>
</body>
</html>
